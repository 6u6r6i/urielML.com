{% extends "index.html" %}

{% block extra_head %}
<style>
    body {
        background: linear-gradient(
            160deg,
            #daeaf8 0%,
            #edf5fc 55%,
            #f7fbff 100%
        ) fixed !important;
        background-color: #daeaf8 !important;
    }
    .logo {
        color: #2e7d45 !important;
        text-shadow:
            1px 1px 0 #000,
            2px 2px 0 rgba(0, 0, 0, 0.18) !important;
    }
</style>
{% endblock extra_head %}

{% block content %}
<div class="post">
    <div class="post__content">
        {{ page.content | safe }}
    </div>
</div>
{% endblock content %}
